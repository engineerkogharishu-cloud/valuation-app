<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f1f3d" />
  <title>Field Data Collection</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ── URL params ───────────────────────────────────────────────────
    const params     = new URLSearchParams(window.location.search);
    const SHORT_CODE = (params.get("c") || "").toUpperCase();        // new short link
    const LEG_TOKEN  = params.get("collect") || "";                  // legacy token
    const LEG_API    = (params.get("api") || "").replace(/\/$/, ""); // legacy api base

    // ── IndexedDB offline queue ──────────────────────────────────────
    const DB_NAME    = "fieldApp";
    const DB_VERSION = 1;
    const STORE      = "queue";

    function openIDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = e => e.target.result.createObjectStore(STORE, { keyPath: "id", autoIncrement: true });
        req.onsuccess = e => resolve(e.target.result);
        req.onerror   = () => reject(req.error);
      });
    }

    async function idbAdd(record) {
      const db  = await openIDB();
      const tx  = db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).add(record);
      return new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
    }

    async function idbGetAll() {
      const db  = await openIDB();
      const tx  = db.transaction(STORE, "readonly");
      const req = tx.objectStore(STORE).getAll();
      return new Promise((res, rej) => { req.onsuccess = () => res(req.result); req.onerror = rej; });
    }

    async function idbDelete(id) {
      const db  = await openIDB();
      const tx  = db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).delete(id);
      return new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
    }

    // ── OLC / Plus Code ──────────────────────────────────────────────
    const OLC = "23456789CFGHJMPQRVWX";
    function plusCode(lat, lng) {
      lat = Math.max(-90, Math.min(90, lat));
      lng = Math.max(-180, Math.min(180, lng));
      let tLat = lat+90, tLng = lng+180, div = 400;
      const c = [];
      for (let p=0; p<5; p++) {
        div /= 20;
        const ld=Math.floor(tLat/div), nd=Math.floor(tLng/div);
        c.push(OLC[ld]); c.push(OLC[nd]);
        tLat-=ld*div; tLng-=nd*div;
      }
      c.splice(8,0,"+"); return c.join("");
    }

    // ── Photo compression ─────────────────────────────────────────────
    function compress(file) {
      return new Promise(resolve => {
        const r = new FileReader();
        r.onload = e => {
          const img = new Image();
          img.onload = () => {
            const MAX=1200; let {width:w,height:h}=img;
            if (w>MAX||h>MAX){const s=Math.min(MAX/w,MAX/h);w=Math.round(w*s);h=Math.round(h*s);}
            const c=document.createElement("canvas"); c.width=w; c.height=h;
            c.getContext("2d").drawImage(img,0,0,w,h);
            resolve(c.toDataURL("image/jpeg",0.78));
          };
          img.src = e.target.result;
        };
        r.readAsDataURL(file);
      });
    }

    // ── Data defaults ─────────────────────────────────────────────────
    const todayISO = () => new Date().toISOString().slice(0,10);
    const SALUTATIONS = ["Mr.", "Mrs.", "Ms."];

    const EMPTY_FORM = {
      submitterSalutation:"", submitterName:"",
      clientSalutation:"", clientName:"",
      ownerSalutation:"", ownerName:"", location:"",
      bank:"", branch:"", visitDate:todayISO(), notes:"",
      lat:"", lng:"", googlePlusCode:"",
      landMarketRate:"", buildingRate:"",
    };
    const EMPTY_ROAD    = {type:"", width:"", side:"", surface:"", remarks:""};
    const ROAD_TYPES    = ["Pitched / Black Topped","Graveled","Earthen / Kachchi","Goreto / Footpath","Under Construction"];
    const ROAD_SIDES    = ["North","South","East","West","North-East","North-West","South-East","South-West"];
    const ROAD_SURFACES = ["Good","Fair","Poor"];
    const EMPTY_HAZARDS = {
      highTensionLine:false, highTensionLineComment:"", highTensionLineDistance:"", highTensionLineSide:"",
      river:false, riverComment:"", riverDistance:"", riverSide:"",
      kuloKholchi:false, kuloKholchiComment:"", kuloKholchiDistance:"", kuloKholchiSide:"",
      floodZone:false, floodZoneComment:"",
      landslide:false, landslideComment:"", landslideDistance:"", landslideSide:"",
      graveyard:false, graveyardComment:"", graveyardDistance:"", graveyardSide:"",
      encroachment:false, encroachmentComment:"", encroachmentSide:"",
    };
    const HAZARDS = [
      {key:"highTensionLine", label:"⚡ High Tension Line",    dist:true,  side:true },
      {key:"river",           label:"🌊 River",                dist:true,  side:true },
      {key:"kuloKholchi",     label:"💧 Kulo / Kholchi",       dist:true,  side:true },
      {key:"floodZone",       label:"🌧 Flood Zone",           dist:false, side:false},
      {key:"landslide",       label:"⛰ Landslide / Erosion",  dist:true,  side:true },
      {key:"graveyard",       label:"⚰ Graveyard / Cemetery", dist:true,  side:true },
      {key:"encroachment",    label:"🚧 Encroachment",         dist:false, side:true },
    ];
    const SIDES = ["North","South","East","West","North-East","North-West","South-East","South-West","Adjacent / On boundary","Multiple sides"];

    // ── Styles ────────────────────────────────────────────────────────
    const S = {
      page:        {minHeight:"100vh",background:"#f0f2f5"},
      header:      {background:"#0f1f3d",padding:"14px 16px",display:"flex",alignItems:"center",gap:10},
      offlineBanner:{background:"#e65100",color:"#fff",textAlign:"center",fontSize:13,fontWeight:600,padding:"7px 16px",display:"flex",alignItems:"center",justifyContent:"center",gap:8},
      syncBanner:  {background:"#1565c0",color:"#fff",textAlign:"center",fontSize:13,fontWeight:600,padding:"7px 16px",display:"flex",alignItems:"center",justifyContent:"center",gap:8,cursor:"pointer"},
      card:        {background:"#fff",margin:"0 auto",maxWidth:520,padding:"20px 16px 32px",boxShadow:"0 2px 12px rgba(0,0,0,0.08)"},
      label:       {display:"block",fontSize:13,fontWeight:600,color:"#444",marginBottom:6},
      input:       {width:"100%",padding:"11px 13px",border:"1.5px solid #ddd",borderRadius:8,fontSize:15,boxSizing:"border-box",outline:"none"},
      select:      {width:"100%",padding:"11px 13px",border:"1.5px solid #ddd",borderRadius:8,fontSize:15,boxSizing:"border-box",background:"#fff"},
      btnShare:    {padding:"8px 14px",background:"rgba(255,255,255,0.15)",color:"#fff",border:"1px solid rgba(255,255,255,0.3)",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,whiteSpace:"nowrap",flexShrink:0},
      btnGps:      {padding:"11px 13px",background:"#0f1f3d",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontWeight:600,whiteSpace:"nowrap",fontSize:14},
      btnPhoto:    {width:"100%",padding:"12px",background:"#f5f5f5",border:"1.5px dashed #bbb",borderRadius:8,cursor:"pointer",fontSize:15,color:"#555",marginBottom:10},
      btnSubmit:   {width:"100%",padding:"14px",background:"#c9922a",color:"#fff",border:"none",borderRadius:10,fontSize:17,fontWeight:700,cursor:"pointer",marginTop:8},
      btnOffline:  {width:"100%",padding:"14px",background:"#546e7a",color:"#fff",border:"none",borderRadius:10,fontSize:17,fontWeight:700,cursor:"pointer",marginTop:8},
      btnOutline:  {width:"100%",padding:"12px",background:"#fff",color:"#0f1f3d",border:"2px solid #0f1f3d",borderRadius:10,fontSize:15,fontWeight:700,cursor:"pointer"},
      btnSecondary:{marginTop:14,padding:"11px 24px",background:"#0f1f3d",color:"#fff",border:"none",borderRadius:8,fontSize:15,cursor:"pointer",fontWeight:600},
      btnAddPlot:  {padding:"7px 13px",background:"#f0f4ff",color:"#0f1f3d",border:"1px solid #c0cfe8",borderRadius:7,cursor:"pointer",fontSize:13,fontWeight:600},
      btnRmPlot:   {padding:"9px 11px",background:"#fff0f0",color:"#c0392b",border:"1px solid #f5c6c6",borderRadius:7,cursor:"pointer",fontSize:13,flexShrink:0},
      divider:     {display:"flex",alignItems:"center",gap:10,margin:"12px 0 10px",color:"#aaa",fontSize:13},
      hint:        {textAlign:"center",fontSize:12,color:"#888",margin:"7px 0 0",lineHeight:1.5},
      rateBox:     {border:"1.5px solid #e0e8f0",borderRadius:10,padding:"13px 13px 10px",marginBottom:16,background:"#f8fbff"},
      boxTitle:    {fontSize:13,fontWeight:700,color:"#0f1f3d",marginBottom:10},
      rateRow:     {display:"flex",gap:10},
      unit:        {fontWeight:400,color:"#888",fontSize:11},
      roadBox:     {border:"1.5px solid #c8dff0",borderRadius:10,padding:"13px 13px 11px",marginBottom:16,background:"#eef5fb"},
      hazardBox:   {border:"1.5px solid #fde8c8",borderRadius:10,padding:"13px 13px 11px",marginBottom:16,background:"#fffaf4"},
      hCheck:      {width:20,height:20,borderRadius:4,border:"1.5px solid #ccc",background:"#f5f5f5",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:13,color:"#c9922a",fontWeight:700,flexShrink:0},
      hCheckOn:    {border:"1.5px solid #c9922a",background:"#fff3d6"},
      subLabel:    {fontSize:11,fontWeight:700,color:"#888",letterSpacing:"0.4px",marginBottom:4},
      errorBox:    {background:"#fff3cd",border:"1px solid #ffc107",borderRadius:8,padding:"11px 15px",marginBottom:14,color:"#7a5000",fontSize:14},
      photoGrid:   {display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8},
      photoThumb:  {position:"relative",aspectRatio:"1",borderRadius:6,overflow:"hidden",border:"1px solid #ddd"},
      photoRm:     {position:"absolute",top:3,right:3,background:"rgba(0,0,0,0.6)",color:"#fff",border:"none",borderRadius:"50%",width:22,height:22,cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"},
      loadPage:    {minHeight:"100vh",background:"#0f1f3d",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,padding:24},
      loadText:    {color:"rgba(255,255,255,0.8)",fontSize:16,textAlign:"center"},
      errPage:     {minHeight:"100vh",background:"#f0f2f5",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,padding:24,textAlign:"center"},
    };

    function F({label,children}) {
      return <div style={{marginBottom:16}}><label style={S.label}>{label}</label>{children}</div>;
    }

    // ── Main App ──────────────────────────────────────────────────────
    function App() {
      const [appState,    setAppState]    = useState("loading"); // loading | error | form | success
      const [errorMsg,    setErrorMsg]    = useState("");
      const [apiBase,     setApiBase]     = useState("");
      const [shortCode,   setShortCode]   = useState("");
      const [companyName, setCompanyName] = useState("");
      const [banks,       setBanks]       = useState([]);
      const [isOnline,    setIsOnline]    = useState(navigator.onLine);
      const [queueCount,  setQueueCount]  = useState(0);
      const [syncing,     setSyncing]     = useState(false);

      const [form,        setForm]        = useState(EMPTY_FORM);
      const [hazards,     setHazards]     = useState(EMPTY_HAZARDS);
      const [plotNos,     setPlotNos]     = useState([""]);
      const [roads,       setRoads]       = useState([{...EMPTY_ROAD}]);
      const [photos,      setPhotos]      = useState([]);
      const [submitting,  setSubmitting]  = useState(false);
      const [submitError, setSubmitError] = useState("");
      const [gpsLoading,  setGpsLoading]  = useState(false);
      const [shareCopied, setShareCopied] = useState(false);
      const fileRef = useRef();

      // Load queue count
      const refreshQueue = useCallback(async () => {
        const items = await idbGetAll();
        setQueueCount(items.length);
      }, []);

      // Online/offline listeners
      useEffect(() => {
        const goOnline  = () => { setIsOnline(true);  refreshQueue(); };
        const goOffline = () => setIsOnline(false);
        window.addEventListener("online",  goOnline);
        window.addEventListener("offline", goOffline);
        return () => { window.removeEventListener("online", goOnline); window.removeEventListener("offline", goOffline); };
      }, [refreshQueue]);

      // Resolve link on mount
      useEffect(() => {
        async function resolve() {
          try {
            if (SHORT_CODE) {
              // New short-code flow
              if (!navigator.onLine) {
                // Offline but we have a cached short code — allow form use
                const cached = JSON.parse(localStorage.getItem(`link_${SHORT_CODE}`) || "null");
                if (cached) {
                  setApiBase(cached.apiUrl); setShortCode(SHORT_CODE);
                  setCompanyName(cached.companyName); setBanks(cached.banks || []);
                  await refreshQueue(); setAppState("form"); return;
                }
                // No cache — show offline error
                setErrorMsg("You are offline and this link has not been used before. Please connect to the internet first.");
                setAppState("error"); return;
              }
              // Online — resolve from server
              // Try to detect the API base from the current page URL or a known env
              const apiGuess = window.FIELD_API_BASE || "";
              if (!apiGuess) {
                setErrorMsg("API base not configured. Please contact your administrator.");
                setAppState("error"); return;
              }
              const r = await fetch(`${apiGuess}/api/field/link/${SHORT_CODE}`);
              const d = await r.json();
              if (!r.ok) { setErrorMsg(d.error || "Invalid link"); setAppState("error"); return; }
              localStorage.setItem(`link_${SHORT_CODE}`, JSON.stringify(d));
              setApiBase(d.apiUrl); setShortCode(SHORT_CODE);
              setCompanyName(d.companyName); setBanks(d.banks || []);
              await refreshQueue(); setAppState("form");

            } else if (LEG_TOKEN && LEG_API) {
              // Legacy flow
              setApiBase(LEG_API); setShortCode("");
              if (navigator.onLine) {
                const r = await fetch(`${LEG_API}/api/field/company-info?token=${encodeURIComponent(LEG_TOKEN)}`);
                const d = await r.json();
                if (!d.error) { setCompanyName(d.companyName || ""); setBanks(d.banks || []); }
              }
              await refreshQueue(); setAppState("form");

            } else {
              setErrorMsg("No valid collection link found. Please use a link provided by your administrator.");
              setAppState("error");
            }
          } catch(e) {
            setErrorMsg("Could not load link: " + e.message);
            setAppState("error");
          }
        }
        resolve();
      }, []);

      // Sync offline queue to server
      const syncQueue = useCallback(async () => {
        if (!isOnline || syncing || !apiBase) return;
        const items = await idbGetAll();
        if (!items.length) return;
        setSyncing(true);
        let synced = 0;
        for (const item of items) {
          try {
            const body = shortCode
              ? { short_code: shortCode, data: item.data, photos: item.photos }
              : { token: LEG_TOKEN, data: item.data, photos: item.photos };
            const r = await fetch(`${apiBase}/api/field/submit`, {
              method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body)
            });
            if (r.ok) { await idbDelete(item.id); synced++; }
          } catch(_) {}
        }
        await refreshQueue();
        setSyncing(false);
        if (synced) alert(`✅ ${synced} offline submission${synced>1?"s":""} synced to server!`);
      }, [isOnline, syncing, apiBase, shortCode, refreshQueue]);

      // Auto-sync when coming back online
      useEffect(() => { if (isOnline && queueCount > 0) syncQueue(); }, [isOnline]);

      const set  = k => e => setForm(f => ({...f,[k]:e.target.value}));
      const setH = (k,v) => setHazards(h => ({...h,[k]:v}));
      const togH = k => setHazards(h => ({...h,[k]:!h[k]}));
      const setPlot = (i,v) => setPlotNos(p => p.map((x,j)=>j===i?v:x));
      const addPlot = () => setPlotNos(p=>[...p,""]);
      const rmPlot  = i => setPlotNos(p=>p.filter((_,j)=>j!==i));
      const setRoadField = (i,k,v) => setRoads(r=>r.map((row,j)=>j===i?{...row,[k]:v}:row));
      const addRoad  = () => setRoads(r=>[...r,{...EMPTY_ROAD}]);
      const rmRoad   = i => setRoads(r=>r.filter((_,j)=>j!==i));

      const addPhotos = async e => {
        const files = Array.from(e.target.files||[]);
        if (!files.length) return;
        const c = await Promise.all(files.map(compress));
        setPhotos(p=>[...p,...c].slice(0,20));
        e.target.value="";
      };

      const getGPS = () => {
        if (!navigator.geolocation) return;
        setGpsLoading(true);
        navigator.geolocation.getCurrentPosition(
          pos => {
            const {latitude:lat,longitude:lng} = pos.coords;
            setForm(f=>({...f,lat:lat.toFixed(6),lng:lng.toFixed(6),googlePlusCode:plusCode(lat,lng)}));
            setGpsLoading(false);
          },
          ()=>setGpsLoading(false),
          {enableHighAccuracy:true,timeout:10000}
        );
      };

      const buildPayload = () => ({
        data: {...form, plotNos:plotNos.map(p=>p.trim()).filter(Boolean),
               roads:roads.filter(r=>r.type||r.width||r.side||r.surface||r.remarks), hazards},
        photos,
      });

      const handleShareUrl = async () => {
        const url = window.location.href;
        if (navigator.share) { try { await navigator.share({title:"Field Data Collection",url}); return; } catch(_){} }
        await navigator.clipboard.writeText(url);
        setShareCopied(true); setTimeout(()=>setShareCopied(false),2500);
      };

      const handleShareFile = async () => {
        const p = buildPayload();
        const name = `field-${form.clientName.replace(/\s+/g,"-")||"entry"}-${Date.now()}.json`;
        const blob = new Blob([JSON.stringify(p,null,2)],{type:"application/json"});
        const file = new File([blob],name,{type:"application/json"});
        if (navigator.share && navigator.canShare?.({files:[file]})) {
          try { await navigator.share({title:"Field Data",files:[file]}); return; } catch(_){} }
        const url=URL.createObjectURL(blob), a=document.createElement("a");
        a.href=url; a.download=name; a.click(); URL.revokeObjectURL(url);
      };

      const handleSubmit = async e => {
        e.preventDefault();
        if (!form.clientName.trim() && !form.location.trim())
          return setSubmitError("Please enter at least a client name or location.");
        setSubmitting(true); setSubmitError("");
        const {data, photos:pics} = buildPayload();

        if (!isOnline) {
          // Save to offline queue
          await idbAdd({data, photos:pics, savedAt: new Date().toISOString()});
          await refreshQueue();
          setSubmitting(false);
          setAppState("success_offline");
          return;
        }

        try {
          const body = shortCode
            ? { short_code: shortCode, data, photos: pics }
            : { token: LEG_TOKEN, data, photos: pics };
          const res  = await fetch(`${apiBase}/api/field/submit`, {
            method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body),
          });
          const json = await res.json();
          if (!res.ok) throw new Error(json.error||"Submission failed");
          setAppState("success");
        } catch(err) {
          // Network error — save offline
          await idbAdd({data, photos:pics, savedAt: new Date().toISOString()});
          await refreshQueue();
          setSubmitError("No internet — saved offline. Will sync automatically when connected.");
        } finally {
          setSubmitting(false);
        }
      };

      const reset = () => {
        setForm({...EMPTY_FORM, visitDate:todayISO()}); setHazards(EMPTY_HAZARDS);
        setPlotNos([""]); setRoads([{...EMPTY_ROAD}]); setPhotos([]); setAppState("form");
      };

      // ── Render states ─────────────────────────────────────────────
      if (appState === "loading") return (
        <div style={S.loadPage}>
          <div style={{fontSize:48}}>📋</div>
          <div style={S.loadText}>Loading collection form…</div>
        </div>
      );

      if (appState === "error") return (
        <div style={S.errPage}>
          <div style={{fontSize:56}}>🔗</div>
          <h2 style={{color:"#c0392b",margin:0}}>Invalid Link</h2>
          <p style={{color:"#555",maxWidth:340}}>{errorMsg}</p>
        </div>
      );

      if (appState === "success") return (
        <div style={S.page}>
          <div style={{...S.card,textAlign:"center",paddingTop:48}}>
            <div style={{fontSize:60,marginBottom:10}}>✅</div>
            <h2 style={{color:"#1a7a3f",margin:"0 0 8px"}}>Submitted!</h2>
            <p style={{color:"#555",fontSize:15}}>Field data sent{companyName ? ` to ${companyName}` : ""}.</p>
            {queueCount > 0 && (
              <p style={{color:"#e65100",fontSize:13,marginTop:8}}>📦 {queueCount} offline item(s) still pending sync.</p>
            )}
            <button style={S.btnSecondary} onClick={reset}>Submit Another</button>
          </div>
        </div>
      );

      if (appState === "success_offline") return (
        <div style={S.page}>
          <div style={{...S.card,textAlign:"center",paddingTop:48}}>
            <div style={{fontSize:60,marginBottom:10}}>💾</div>
            <h2 style={{color:"#e65100",margin:"0 0 8px"}}>Saved Offline</h2>
            <p style={{color:"#555",fontSize:15}}>You are offline. Data saved on this device ({queueCount} pending).</p>
            <p style={{color:"#777",fontSize:13}}>It will be sent automatically when you reconnect to internet.</p>
            <button style={S.btnSecondary} onClick={reset}>Add Another Entry</button>
          </div>
        </div>
      );

      // ── Main form ─────────────────────────────────────────────────
      return (
        <div style={S.page}>

          {/* Offline / Sync banners */}
          {!isOnline && (
            <div style={S.offlineBanner}>
              📵 Offline — submissions will be saved locally and synced when connected
            </div>
          )}
          {isOnline && queueCount > 0 && (
            <div style={S.syncBanner} onClick={syncQueue}>
              {syncing ? "⏳ Syncing…" : `📤 ${queueCount} offline submission${queueCount>1?"s":""} pending — tap to sync`}
            </div>
          )}

          {/* Header */}
          <div style={S.header}>
            <div style={{flex:1}}>
              <div style={{fontSize:20,fontWeight:700,color:"#fff"}}>📋 Field Data Collection</div>
              {companyName && <div style={{fontSize:12,color:"rgba(255,255,255,0.72)",marginTop:2}}>{companyName}</div>}
            </div>
            <button type="button" onClick={handleShareUrl} style={S.btnShare}>
              {shareCopied?"✓ Copied":"🔗 Share"}
            </button>
          </div>

          <form onSubmit={handleSubmit} style={S.card}>

            <F label="Your Name (Collector)">
              <div style={{display:"flex",gap:6}}>
                <select style={{...S.select,width:90,flexShrink:0}} value={form.submitterSalutation} onChange={set("submitterSalutation")}>
                  <option value="">—</option>
                  {SALUTATIONS.map(s=><option key={s} value={s}>{s}</option>)}
                </select>
                <input style={{...S.input,flex:1}} value={form.submitterName} onChange={set("submitterName")} placeholder="Enter your name" autoComplete="name" />
              </div>
            </F>

            <F label="Client / Borrower Name *">
              <div style={{display:"flex",gap:6}}>
                <select style={{...S.select,width:90,flexShrink:0}} value={form.clientSalutation} onChange={set("clientSalutation")}>
                  <option value="">—</option>
                  {SALUTATIONS.map(s=><option key={s} value={s}>{s}</option>)}
                </select>
                <input style={{...S.input,flex:1}} value={form.clientName} onChange={set("clientName")} placeholder="Full name of client" autoComplete="off" />
              </div>
            </F>

            <F label="Owner Name">
              <div style={{display:"flex",gap:6}}>
                <select style={{...S.select,width:90,flexShrink:0}} value={form.ownerSalutation} onChange={set("ownerSalutation")}>
                  <option value="">—</option>
                  {SALUTATIONS.map(s=><option key={s} value={s}>{s}</option>)}
                </select>
                <input style={{...S.input,flex:1}} value={form.ownerName} onChange={set("ownerName")} placeholder="Property owner name (if different from client)" autoComplete="off" />
              </div>
            </F>

            <F label="Bank">
              {banks.length > 0
                ? <select style={S.select} value={form.bank} onChange={set("bank")}>
                    <option value="">— Select bank —</option>
                    {banks.map(b=><option key={b} value={b}>{b}</option>)}
                  </select>
                : <input style={S.input} value={form.bank} onChange={set("bank")} placeholder="Bank name" autoComplete="off" />}
            </F>

            <F label="Branch">
              <input style={S.input} value={form.branch} onChange={set("branch")} placeholder="Branch name" autoComplete="off" />
            </F>

            <F label="Visit Date">
              <input style={S.input} type="date" value={form.visitDate} onChange={set("visitDate")} />
            </F>

            <F label="Property Location / Address *">
              <input style={S.input} value={form.location} onChange={set("location")} placeholder="Ward, VDC/Municipality, District" autoComplete="off" />
            </F>

            {/* Plot numbers */}
            <div style={{marginBottom:16}}>
              <label style={S.label}>Plot Number(s)</label>
              {plotNos.map((val,i)=>(
                <div key={i} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
                  <input style={{...S.input,flex:1,marginBottom:0}} value={val}
                    onChange={e=>setPlot(i,e.target.value)}
                    placeholder={`Kitta / Plot No.${plotNos.length>1?" "+(i+1):""}`} autoComplete="off" />
                  {plotNos.length>1 && <button type="button" onClick={()=>rmPlot(i)} style={S.btnRmPlot}>✕</button>}
                </div>
              ))}
              <button type="button" onClick={addPlot} style={S.btnAddPlot}>＋ Add Plot Number</button>
            </div>

            {/* Road Details */}
            <div style={S.roadBox}>
              <div style={S.boxTitle}>🛣️ Road Details</div>
              {roads.map((road,i)=>(
                <div key={i} style={{border:"1.5px solid #c8dff0",borderRadius:8,padding:"11px 11px 9px",marginBottom:9,background:"#f4f9ff",position:"relative"}}>
                  {roads.length>1 && (
                    <button type="button" onClick={()=>rmRoad(i)}
                      style={{position:"absolute",top:7,right:7,padding:"3px 8px",background:"#fff0f0",color:"#c0392b",border:"1px solid #f5c6c6",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:700}}>✕</button>
                  )}
                  {roads.length>1 && <div style={{fontSize:12,fontWeight:700,color:"#0f1f3d",marginBottom:9}}>Road {i+1}</div>}
                  <div style={{display:"flex",gap:9,marginBottom:9}}>
                    <div style={{flex:1}}>
                      <div style={S.subLabel}>TYPE</div>
                      <select style={{...S.select,fontSize:13}} value={road.type} onChange={e=>setRoadField(i,"type",e.target.value)}>
                        <option value="">— Select —</option>
                        {ROAD_TYPES.map(t=><option key={t}>{t}</option>)}
                      </select>
                    </div>
                    <div style={{flex:1}}>
                      <div style={S.subLabel}>SIDE</div>
                      <select style={{...S.select,fontSize:13}} value={road.side} onChange={e=>setRoadField(i,"side",e.target.value)}>
                        <option value="">— Select —</option>
                        {ROAD_SIDES.map(s=><option key={s}>{s}</option>)}
                      </select>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:9,marginBottom:9}}>
                    <div style={{flex:1}}>
                      <div style={S.subLabel}>WIDTH (ft)</div>
                      <input style={{...S.input,fontSize:13}} type="number" min="0" value={road.width}
                        onChange={e=>setRoadField(i,"width",e.target.value)} placeholder="e.g. 20" autoComplete="off" />
                    </div>
                    <div style={{flex:1}}>
                      <div style={S.subLabel}>SURFACE CONDITION</div>
                      <select style={{...S.select,fontSize:13}} value={road.surface} onChange={e=>setRoadField(i,"surface",e.target.value)}>
                        <option value="">— Select —</option>
                        {ROAD_SURFACES.map(s=><option key={s}>{s}</option>)}
                      </select>
                    </div>
                  </div>
                  <div>
                    <div style={S.subLabel}>REMARKS</div>
                    <input style={{...S.input,fontSize:13}} value={road.remarks}
                      onChange={e=>setRoadField(i,"remarks",e.target.value)}
                      placeholder="Additional remarks…" autoComplete="off" />
                  </div>
                </div>
              ))}
              <button type="button" onClick={addRoad} style={S.btnAddPlot}>＋ Add Another Road</button>
            </div>

            {/* Rates */}
            <div style={S.rateBox}>
              <div style={S.boxTitle}>📊 Market Rates</div>
              <div style={S.rateRow}>
                <div style={{flex:1}}>
                  <label style={S.label}>Land Market Rate <span style={S.unit}>(Rs./aana)</span></label>
                  <input style={S.input} type="number" min="0" value={form.landMarketRate} onChange={set("landMarketRate")} placeholder="0" />
                </div>
                <div style={{flex:1}}>
                  <label style={S.label}>Building Rate <span style={S.unit}>(Rs./sq.ft)</span></label>
                  <input style={S.input} type="number" min="0" value={form.buildingRate} onChange={set("buildingRate")} placeholder="0" />
                </div>
              </div>
            </div>

            {/* GPS */}
            <F label="GPS Coordinates">
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <input style={{...S.input,flex:1}} value={form.lat?`${form.lat}, ${form.lng}`:""} placeholder="Tap Get GPS" readOnly />
                <button type="button" style={S.btnGps} onClick={getGPS} disabled={gpsLoading}>
                  {gpsLoading?"…":"📍 GPS"}
                </button>
              </div>
            </F>

            <F label="Google Plus Code">
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <input style={{...S.input,flex:1,fontFamily:"monospace",letterSpacing:"0.5px"}}
                  value={form.googlePlusCode} onChange={set("googlePlusCode")}
                  placeholder="e.g. P977+95 Kathmandu" autoComplete="off" autoCorrect="off" autoCapitalize="characters" spellCheck={false} />
                {form.lat && !form.googlePlusCode && (
                  <button type="button" style={S.btnGps}
                    onClick={()=>setForm(f=>({...f,googlePlusCode:plusCode(parseFloat(f.lat),parseFloat(f.lng))}))}>
                    Generate
                  </button>
                )}
              </div>
              <div style={{fontSize:11,color:"#888",marginTop:4}}>Auto-filled when GPS is captured.</div>
            </F>

            <F label="Notes / Observations">
              <textarea style={{...S.input,height:80,resize:"vertical"}} value={form.notes} onChange={set("notes")} placeholder="Any relevant observations, remarks…" />
            </F>

            {/* Hazards */}
            <div style={S.hazardBox}>
              <div style={S.boxTitle}>⚠️ Hazards / Encumbrances</div>
              <div style={{display:"flex",flexDirection:"column",gap:9}}>
                {HAZARDS.map(({key,label,dist,side})=>(
                  <div key={key} style={{border:`1.5px solid ${hazards[key]?"#f0c070":"#e5e7eb"}`,borderRadius:8,padding:"9px 11px",background:hazards[key]?"#fffaf4":"#fff"}}>
                    <button type="button" onClick={()=>togH(key)}
                      style={{display:"flex",alignItems:"center",gap:10,border:"none",background:"transparent",padding:0,width:"100%",cursor:"pointer",marginBottom:hazards[key]?9:0}}>
                      <span style={{...S.hCheck,...(hazards[key]?S.hCheckOn:{})}}>{hazards[key]?"✓":""}</span>
                      <span style={{fontSize:14,fontWeight:hazards[key]?700:400,color:hazards[key]?"#7a4f00":"#444"}}>{label}</span>
                    </button>
                    {hazards[key] && (
                      <div style={{display:"flex",flexDirection:"column",gap:7}}>
                        {dist && <div>
                          <div style={S.subLabel}>DISTANCE</div>
                          <input style={{...S.input,borderColor:"#f0c070",background:"#fffaf4"}}
                            value={hazards[key+"Distance"]} onChange={e=>setH(key+"Distance",e.target.value)}
                            placeholder="e.g. 50 metres" autoComplete="off" />
                        </div>}
                        {side && <div>
                          <div style={S.subLabel}>SIDE / DIRECTION</div>
                          <select style={{...S.select,borderColor:"#f0c070",background:"#fffaf4"}}
                            value={hazards[key+"Side"]} onChange={e=>setH(key+"Side",e.target.value)}>
                            <option value="">— Select —</option>
                            {SIDES.map(s=><option key={s}>{s}</option>)}
                          </select>
                        </div>}
                        <div>
                          <div style={S.subLabel}>REMARKS</div>
                          <input style={{...S.input,borderColor:"#f0c070",background:"#fffaf4"}}
                            value={hazards[key+"Comment"]} onChange={e=>setH(key+"Comment",e.target.value)}
                            placeholder="Additional remarks…" autoComplete="off" />
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>

            {/* Photos */}
            <div style={{marginBottom:18}}>
              <label style={S.label}>Photos ({photos.length}/20)</label>
              <button type="button" style={S.btnPhoto} onClick={()=>fileRef.current?.click()}>📷 Add Photos</button>
              <input ref={fileRef} type="file" accept="image/*" multiple capture="environment"
                style={{display:"none"}} onChange={addPhotos} />
              {photos.length>0 && (
                <div style={S.photoGrid}>
                  {photos.map((src,i)=>(
                    <div key={i} style={S.photoThumb}>
                      <img src={src} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} />
                      <button type="button" onClick={()=>setPhotos(p=>p.filter((_,j)=>j!==i))} style={S.photoRm}>✕</button>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {submitError && <div style={S.errorBox}>{submitError}</div>}

            {isOnline ? (
              <button type="submit" style={S.btnSubmit} disabled={submitting}>
                {submitting?"Submitting…":"Submit Field Data"}
              </button>
            ) : (
              <button type="submit" style={S.btnOffline} disabled={submitting}>
                {submitting?"Saving…":"💾 Save Offline"}
              </button>
            )}

            <div style={S.divider}>
              <div style={{flex:1,height:1,background:"#e5e7eb"}} />
              <span style={{color:"#aaa",fontSize:13}}>or</span>
              <div style={{flex:1,height:1,background:"#e5e7eb"}} />
            </div>

            <button type="button" style={S.btnOutline} onClick={handleShareFile}>
              📤 Share / Save as File
            </button>
            <p style={S.hint}>
              Saves data as a <strong>.json</strong> file — share via WhatsApp, email, etc.
            </p>

          </form>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
    // Set the Railway API base URL here — injected at build/deploy time
    // This allows the short-link resolver to know where the backend is
    window.FIELD_API_BASE = "https://valuation-app-production-fff1.up.railway.app";
  </script>
</body>
</html>
