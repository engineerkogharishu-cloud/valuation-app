app = "valuation-backend"
primary_region = "sin"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3001"
  DB_PATH = "/app/data/valuation.db"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "data"
  destination = "/app/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
